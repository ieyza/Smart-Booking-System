<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Smart Booking System</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">

    <!-- CUSTOM CSS (FIXED FOR FLASK STATIC) -->
    <link rel="stylesheet" href="/static/landing/styles/base.css">
    <link rel="stylesheet" href="/static/landing/styles/layout.css">
    <link rel="stylesheet" href="/static/landing/styles/card.css">
    <link rel="stylesheet" href="/static/landing/styles/button.css">
    <link rel="stylesheet" href="/static/landing/styles/typography.css">
</head>

<body>

<!-- HERO -->
<section id="intro" class="hero-section section-card">

    <div class="container">

        <div class="row align-items-center">

            <!-- TEXT -->
            <div class="col-md-6 text-center text-md-start">

                <p class="hero-badge">Smart Booking System</p>

                <h1>
                    Hassle-Free Booking <br>
                    Without Conflicts
                </h1>

                <p class="lead">
                    A smart booking system for lecturers and staff with automated approvals,
                    real-time availability, and zero scheduling conflicts.
                </p>

                <div class="mt-4 hero-buttons">

                    <button class="btn btn-primary">Start Booking</button>

                    <button class="btn btn-secondary-custom">View My Bookings</button>

                    <a href="/login-page" class="btn btn-outline">Admin Login</a>

                </div>

            </div>

            <!-- IMAGE -->
            <div class="col-md-6 text-center mt-4 mt-md-0">

                <img src="/static/landing/assets/images/Booking.png"
                     class="img-fluid hero-image fade-in"
                     alt="Booking System Preview">

            </div>

        </div>

    </div>

</section>

<!-- COMPONENTS (DYNAMIC LOAD) -->
<div id="advantages"></div>
<div id="features"></div>
<div id="flow"></div>
<div id="target-user"></div>

<!-- FOOTER -->
<footer class="text-center p-4 bg-dark text-white">
    <p>© 2026 Smart Booking System</p>
    <p>contact@email.com</p>
</footer>

<!-- USER FLOW MODAL -->
<div class="modal fade" id="userFlowModal" tabindex="-1">
  <div class="modal-dialog modal-xl modal-dialog-centered">
    <div class="modal-content">

      <div class="modal-header">
        <h5 class="modal-title">User Flow</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>

      <div class="modal-body text-center">
        <img src="/static/landing/assets/images/userflow.png" class="img-fluid">
      </div>

    </div>
  </div>
</div>

<!-- ADMIN FLOW MODAL -->
<div class="modal fade" id="adminFlowModal" tabindex="-1">
  <div class="modal-dialog modal-xl modal-dialog-centered">
    <div class="modal-content">

      <div class="modal-header">
        <h5 class="modal-title">Admin Flow</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>

      <div class="modal-body text-center">
       <img src="/static/landing/assets/images/adminflow.png" class="img-fluid">
      </div>

    </div>
  </div>
</div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<!-- COMPONENT LOADER (FIXED PATH) -->
<script src="/static/landing/script.js"></script>

</body>
</html>
