<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Booking Form</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<!-- USE ADMIN DASHBOARD CSS -->
<link rel="stylesheet" href="../static/css/style.css">
<link rel="stylesheet" href="../static/css/booking.css">
</head>

<body class="bg-soft">

<div class="container py-5">

  <!-- CARD -->
  <div class="premium-card">

    <div class="p-4 border-bottom">
      <h3 class="text-primary-custom fw-bold mb-1">Lecture Hall A</h3>
      <small class="text-muted">Room ID: LH001</small>
    </div>

    <div class="p-4">

      <!-- IMAGE -->
      <div class="text-center mb-4">
        <img src="../static/images/LH.png" class="img-fluid rounded-3" style="max-height:280px; object-fit:cover;">
      </div>

      <!-- FORM -->
      <form id="bookingForm" action="/api/bookings" method="POST" class="needs-validation" novalidate>

        <h5 class="mb-3 fw-semibold">Booking Details</h5>

       <div class="row g-2">

          <div class="col-md-6 mb-3">
            <label>Name <span class="req">*</span></label>
            <input type="text" id="name" class="form-control premium-input" required>
          </div>

          <div class="col-md-6 mb-3">
            <label>Email <span class="req">*</span></label>
            <input type="email" class="form-control premium-input" required>
          </div>

          <div class="col-md-6 mb-3">
            <label>Phone No <span class="req">*</span></label>
            <input type="text" class="form-control premium-input" required>
          </div>

          <div class="col-md-6 mb-3">
            <label>Date <span class="req">*</span></label>
            <input type="date" class="form-control premium-input" required>
          </div>

          <div class="col-md-6 mb-3">
            <label>From <span class="req">*</span></label>
            <input type="time" class="form-control premium-input" required>
          </div>

          <div class="col-md-6 mb-3">
            <label>To <span class="req">*</span></label>
            <input type="time" class="form-control premium-input" required>
          </div>

          <div class="col-12 mb-3">
            <label>Purpose <span class="req">*</span></label>
            <textarea class="form-control premium-input" rows="3" required></textarea>
          </div>

        </div>

        <!-- BUTTONS -->
        <div class="d-flex justify-content-between mt-4">

          <a href="rooms.html" class="btn btn-outline-secondary">
            ← Back to Room Page
          </a>

          <div class="d-flex gap-2">

            <button type="reset" class="btn btn-outline-danger">
              Reset
            </button>

            <button type="submit" class="btn btn-primary-custom">
              Submit Booking
            </button>

          </div>

        </div>

      </form>

    </div>
  </div>

</div>

<script src="../static/js/booking.js"></script>
</body>
</html>
