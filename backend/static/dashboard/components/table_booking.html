<!-- BOOKING TABLE COMPONENT -->

<div class="card premium-card">

  <!-- TABLE HEADER -->
  <div class="card-header bg-white fw-semibold">
    Booking List
  </div>

  <div class="card-body">

    <!-- TABLE -->
    <table class="table premium-table align-middle">

      <thead>
        <tr>
          <th>ID</th>
          <th>User</th>
          <th>Date</th>
          <th>Time</th>
          <th>Purpose</th>
          <th>Status</th>

          <!-- ACTION COLUMN -->
          <th>Action</th>
        </tr>
      </thead>

      <!-- JS will inject rows here -->
      <tbody id="bookingTable">
      </tbody>

    </table>

  </div>
</div>
