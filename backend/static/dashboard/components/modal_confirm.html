<!-- MODAL OVERLAY -->
<div id="modalOverlay" class="modal-overlay hidden">

  <!-- MODAL BOX -->
  <div class="modal-box">

    <!-- TITLE -->
    <h5 id="modalTitle">Confirmation</h5>

    <!-- MESSAGE -->
    <p id="modalMessage">
      Are you sure you want to proceed?
    </p>

    <!-- ACTION BUTTONS -->
    <div class="modal-actions">

      <!-- CANCEL -->
      <button class="btn btn-light" onclick="closeModal()">
        No
      </button>

      <!-- CONFIRM -->
      <button id="confirmBtn" class="btn btn-danger">
        Yes
      </button>

    </div>

  </div>

</div>
